
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dude Naveen Hacker Zone</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #0d0d0d;
      color: #fff;
      font-family: 'Courier New', monospace;
    }

    #gateScreen {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: black;
      color: #00ffff;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      text-align: center;
    }

    #enterBtn {
      display: none;
      margin-top: 20px;
      padding: 10px 20px;
      font-size: 16px;
      font-weight: bold;
      background: #00ffff;
      color: black;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    marquee {
      font-size: 20px;
      font-weight: bold;
      padding: 10px 0;
      background: black;
      color: red;
    }

    .main-content {
      padding: 30px;
      text-align: center;
    }

  </style>
</head>
<body>

<!-- 🚪 Hacker Entry Gate -->
<div id="gateScreen">
  <marquee direction="left" scrollamount="6">💻 WELCOME TO THE HACKING WORLD OF DUDE NAVEEN 👾</marquee>
  <p style="margin-top: 20px;">Please wait <span id="seconds">5</span> seconds...</p>
  <button id="enterBtn" onclick="document.getElementById('gateScreen').style.display='none';">🚪 Enter</button>
</div>

<!-- 🔓 Main Page Content -->
<div class="main-content">
  <h1>📚 RAITHAN बह्रमास्त्र Notes</h1>
  <p>This is your content section. Add your videos, notes, or download buttons here.</p>
</div>

<!-- ⏳ Countdown Script -->
<script>
  let sec = 5;
  const secEl = document.getElementById("seconds");
  const btn = document.getElementById("enterBtn");
  const gate = document.getElementById("gateScreen");

  const timer = setInterval(() => {
    sec--;
    secEl.textContent = sec;
    if (sec === 0) {
      clearInterval(timer);
      btn.style.display = "inline-block";
    }
  }, 1000);
</script>

</body>
</html>
